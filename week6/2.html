<!DOCTYPE html>
<html>
<head>
<title>Student Registration Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script>
function showAlert() {
document.getElementById("successAlert").style.display = "block";
window.scrollTo(0,0);
return false;
}
</script>
</head>
<body class="bg-light">
<div class="container mt-5">
<h2 class="text-center mb-4">Student Registration Form</h2>
<div id="successAlert" class="alert alert-success text-center" style="display:none;">
Form submitted successfully!
</div>
<div class="row justify-content-center">
<div class="col-md-8">
<form onsubmit="return showAlert()">
<div class="mb-3">
<label class="form-label">Student Name</label>
<input type="text" class="form-control">
</div>
<div class="mb-3">
<label class="form-label">Roll Number</label>
<input type="text" class="form-control">
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" class="form-control">
</div>
<div class="mb-3">
<label class="form-label">Gender</label><br>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Male</label>
</div>
<div class="form-check form-check-inline">
<input class="form-check-input" type="radio" name="gender">
<label class="form-check-label">Female</label>
</div>
</div>
<div class="mb-3">
<label class="form-label">Department</label>
<select class="form-select">
<option>Select Department</option>
<option>IT</option>
<option>CSE</option>
<option>ECE</option>
<option>EEE</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Subjects</label>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">DAA</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Data Structures</label>
</div>
<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">DBMS</label>
</div>
</div>
<div class="mb-3">
<label class="form-label">Upload Photo</label>
<input type="file" class="form-control">
</div>
<div class="text-center mt-4">
<button type="submit" class="btn btn-primary me-2">Submit</button>
<button type="reset" class="btn btn-secondary">Reset</button>
</div>
</form>
</div>
</div>
</div>
</body>
</html>
